<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini ERP - Categorias</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>Mini ERP</h1>
    <h2>Gestão de categorias</h2>
    <nav aria-label="Navegação principal">
        <a href="index.html">Painel</a>
        <a href="produtos.html">Produtos</a>
        <a href="categorias.html" aria-current="page">Categorias</a>
        <a href="fornecedores.html">Fornecedores</a>
        <a href="movimentacoes.html">Movimentações</a>
        <a href="estoque-baixo.html">Estoque baixo</a>
    </nav>
</header>
<main>
    <section aria-label="Cadastro de categoria">
        <h3>Cadastro de categoria</h3>
        <form id="formCategoria" novalidate>
            <div><label for="categoriaId">ID</label><input type="number" id="categoriaId" name="categoriaId"></div>
            <div><label for="categoriaNome">Nome</label><input type="text" id="categoriaNome" name="categoriaNome"></div>
            <button type="submit" id="botaoSalvarCategoria">Cadastrar categoria</button>
            <button type="reset" id="botaoLimparCategoria">Limpar</button>
        </form>
    </section>
    <p id="mensagem"></p>
    <section class="tabela-categorias" aria-label="Lista de categorias">
        <h3>Lista de categorias</h3>
        <table><thead><tr><th>ID</th><th>Nome</th><th>Ações</th></tr></thead><tbody id="tabelaCategorias"><tr><td colspan="3">Nenhuma categoria cadastrada.</td></tr></tbody></table>
    </section>
</main>
<footer><p>Mini ERP - Projeto de Aprendizado</p></footer>
<script src="js/dom-elements.js?v=3"></script>
<script src="js/api.js?v=3"></script>
<script src="js/ui.js?v=3"></script>
<script src="js/produto-controller.js?v=3"></script>
<script src="js/categoria-controller.js?v=3"></script>
<script src="js/fornecedor-controller.js?v=3"></script>
<script src="js/movimentacao-controller.js?v=3"></script>
<script src="js/painel-controller.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
