<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini ERP - Controle de Estoque</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>Mini ERP</h1>
    <h2>Painel de estoque</h2>
    <nav aria-label="Navegação principal">
        <a href="index.html" aria-current="page">Painel</a>
        <a href="produtos.html">Produtos</a>
        <a href="categorias.html">Categorias</a>
        <a href="fornecedores.html">Fornecedores</a>
        <a href="movimentacoes.html">Movimentações</a>
        <a href="estoque-baixo.html">Estoque baixo</a>
    </nav>
</header>
<main>
    <section class="indicadores" aria-label="Indicadores do estoque">
        <h3>Indicadores</h3>

        <div class="cards-indicadores">
            <div class="card-indicador">
                <h4>Produtos cadastrados</h4>
                <p id="quantidadeProdutos">0</p>
            </div>

            <div class="card-indicador">
                <h4>Itens em estoque</h4>
                <p id="itensEstoque">0</p>
            </div>

            <div class="card-indicador">
                <h4>Valor total em estoque</h4>
                <p id="valorTotalEstoque">R$ 0,00</p>
            </div>
        </div>
    </section>
    <p id="mensagem"></p>
</main>
<footer>
    <p>Mini ERP - Projeto de Aprendizado</p>
</footer>
<script src="js/dom-elements.js?v=3"></script>
<script src="js/api.js?v=3"></script>
<script src="js/ui.js?v=3"></script>
<script src="js/produto-controller.js?v=3"></script>
<script src="js/categoria-controller.js?v=3"></script>
<script src="js/fornecedor-controller.js?v=3"></script>
<script src="js/movimentacao-controller.js?v=3"></script>
<script src="js/painel-controller.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
