<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini ERP - Movimentações</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>Mini ERP</h1>
    <h2>Movimentações de estoque</h2>
    <nav aria-label="Navegação principal">
        <a href="index.html">Painel</a>
        <a href="produtos.html">Produtos</a>
        <a href="categorias.html">Categorias</a>
        <a href="fornecedores.html">Fornecedores</a>
        <a href="movimentacoes.html" aria-current="page">Movimentações</a>
        <a href="estoque-baixo.html">Estoque baixo</a>
    </nav>
</header>
<main>
    <section aria-label="Movimentação de estoque">
        <h3>Movimentação de estoque</h3>
        <form id="formMovimentacaoEstoque" novalidate>
            <div><label for="movimentacaoCodigo">Código do produto</label><input type="number" id="movimentacaoCodigo" name="movimentacaoCodigo"></div>
            <div><label for="movimentacaoQuantidade">Quantidade</label><input type="number" id="movimentacaoQuantidade" name="movimentacaoQuantidade"></div>
            <button type="button" id="botaoRegistrarEntrada">Registrar entrada</button>
            <button type="button" id="botaoRegistrarSaida">Registrar saída</button>
            <button type="button" id="botaoBuscarHistorico">Ver histórico</button>
            <button type="reset">Limpar</button>
        </form>
    </section>
    <p id="mensagem"></p>
    <section class="tabela-movimentacoes" aria-label="Histórico de movimentações">
        <h3>Histórico de movimentações</h3>
        <table><thead><tr><th>Data</th><th>Código</th><th>Tipo</th><th>Quantidade</th><th>Saldo anterior</th><th>Saldo novo</th></tr></thead><tbody id="tabelaMovimentacoes"><tr><td colspan="6">Nenhuma movimentação registrada.</td></tr></tbody></table>
    </section>
</main>
<footer><p>Mini ERP - Projeto de Aprendizado</p></footer>
<script src="js/dom-elements.js?v=3"></script>
<script src="js/api.js?v=3"></script>
<script src="js/ui.js?v=3"></script>
<script src="js/produto-controller.js?v=3"></script>
<script src="js/categoria-controller.js?v=3"></script>
<script src="js/fornecedor-controller.js?v=3"></script>
<script src="js/movimentacao-controller.js?v=3"></script>
<script src="js/painel-controller.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
