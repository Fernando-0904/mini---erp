name: Testes automatizados

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restaurar dependencias
        run: dotnet restore MiniErp.slnx

      - name: Executar testes
        run: dotnet test MiniErp.Api.Tests/MiniErp.Api.Tests.csproj --no-restore
